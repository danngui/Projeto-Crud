<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="scripts/style_dashboard.css">

</head>

<body>

  <!-- OVERLAY -->
  <div class="modal-overlay" id="modalOverlay"></div>

  <!-- MODAL NEW USER -->
  <div class="new-user-modal" id="newUserModal">

    <div class="modal-header">

      <h2>Novo Usuário</h2>

      <button class="close-modal" id="closeModal">

        <img src="icons/close.png" alt="">

      </button>

    </div>

    <div class="modal-body">

      <p class="modal-description">
        Gerencie os usuários e funções aqui.
      </p>

      <div class="input-group">

        <label>Nome</label>

        <input type="text" placeholder="Daniel">

      </div>

      <div class="input-group">

        <label>Sobrenome</label>

        <input type="text" placeholder="Guilherme">

      </div>

      <div class="input-group">

        <label>Email</label>

        <input type="email" placeholder="daniel.guilherme@exemplo.com">

      </div>

      <div class="input-group">

        <label>Cargo</label>

        <div class="select-wrapper">

          <select>

            <option>Usuário</option>
            <option>Admin</option>
            <option>Moderador</option>

          </select>

        </div>

      </div>

      <div class="modal-actions">

        <button class="create-user-btn">
          Criar Usuário
        </button>

      </div>

    </div>

  </div>

  <div class="wrapper">

    <aside class="sidebar">

      <div class="sidebar-mini">

        <div class="top-mini">

          <div class="logo">

            <img src="icons/windows-logo.png" alt="">

          </div>

          <div class="icon-group">

            <div class="icon" data-page="graph.html">

              <img src="icons/graph.png" alt="">

            </div>

            <div class="icon" data-page="lista.html">

              <img src="icons/dashboard-interface.png" alt="">

            </div>

          </div>

        </div>

        <div class="icon-group">

          <div class="icon" data-page="notifications.html">
            <img src="icons/bell.png" alt="">
          </div>

          <div class="icon active">

            <img src="icons/settings.png" alt="">

          </div>


          <div class="icon" data-page="usuario.html">

            <img src="icons/user-circle.png" alt="">

          </div>

        </div>

      </div>

      <div class="sidebar-content">

        <div class="menu-btn">

          <img src="icons/button.png" alt="">

        </div>

        <div class="nav">

          <div class="nav-item active">

            <img src="icons/users.png" class="menu-icon" alt="">

            <span>Gerenciar Usuários</span>

          </div>

          <div class="nav-item" data-page="products.html">

            <img src="icons/cubes.png" class="menu-icon" alt="">

            <span>Gerenciar Produtos</span>

          </div>

        </div>

      </div>

    </aside>

    <main class="main">

      <div class="topbar">

        <h1 class="title">
          Admin Dashboard
        </h1>

      </div>

      <div class="actions">

        <button class="new-user">

          <img src="icons/plus.png" class="button-icon" alt="">

          Novo Usuário

        </button>

        <div class="search-area">

          <div class="search-box">

            <input type="text" placeholder="Pesquisar Usuário">

            <img src="icons/magnifying-glass.png" class="search-icon" alt="">

          </div>

          <div class="filter">

            <img src="icons/arrows-up-down.png" alt="">

          </div>

        </div>

      </div>

      <div class="tag-row">

        <div class="tag">

          Ativo

          <img src="icons/close.png" class="tag-icon" alt="">

        </div>

        <div class="delete">

          <img src="icons/trash.png" alt="">

        </div>

      </div>

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>

                <div class="th-content">

                  Nome

                  <img src="icons/arrows-up-down.png" class="th-icon" alt="">

                </div>

              </th>

              <th>

                <div class="th-content">

                  Email

                  <img src="icons/arrows-up-down.png" class="th-icon" alt="">

                </div>

              </th>

              <th>

                <div class="th-content">

                  Status

                  <img src="icons/arrows-up-down.png" class="th-icon" alt="">

                </div>

              </th>

              <th>

                <div class="th-content">

                  Data da Criação

                  <img src="icons/arrows-up-down.png" class="th-icon" alt="">

                </div>

              </th>

              <th>Ação</th>

            </tr>

          </thead>

          <tbody>

            <tr>

              <td>

                <div class="user">

                  <div class="avatar">
                    H
                  </div>

                  Usuário 1

                </div>

              </td>

              <td>usuario@gmail.com</td>

              <td class="status">
                Ativo
              </td>

              <td>Jan 10, 2022</td>

              <td class="dots">

                <img src="icons/dots.png" class="dots-icon" alt="">

                <div class="action-menu">

                  <button class="action-item">
                    Editar
                  </button>

                  <button class="action-item">
                    Deletar
                  </button>

                </div>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </main>

    <div class="floating-help">

      <img src="icons/question-mark.png" alt="">

    </div>

  </div>

  <script src="scripts/script_dashboard.js"></script>

</body>

</html>
