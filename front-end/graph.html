<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Análise</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="scripts/style_products.css">

</head>

<body>

  <div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-mini">

        <div class="top-mini">

          <div class="logo">

            <img src="icons/windows-logo.png" alt="">

          </div>

          <div class="icon-group">

            <div class="icon active">

              <img src="icons/graph.png" alt="">

            </div>

            <div class="icon" data-page="lista.html">

              <img src="icons/dashboard-interface.png" alt="">

            </div>

          </div>

        </div>

        <div class="icon-group">

          <div class="icon" data-page="notifications.html">

            <img src="icons/bell.png" alt="">

          </div>

          <div class="icon" data-page="dashboard.html">

            <img src="icons/settings.png" alt="">

          </div>

          <div class="icon" data-page="usuario.html">

            <img src="icons/user-circle.png" alt="">

          </div>

        </div>

      </div>

      <div class="sidebar-content">

        <div class="menu-btn">

          <img src="icons/button.png" alt="">

        </div>

        <div class="nav">

          <div class="nav-item active">

            <img src="icons/graph.png" class="menu-icon" alt="">

            <span>Análise</span>

          </div>

        </div>

      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="topbar">

        <h1 class="title">
          Dashboard
        </h1>

      </div>

      <!-- CARDS -->
      <div class="products-stats">

        <div class="product-card">

          <div class="product-card-top">

            <span>Vendas Hoje</span>

            <img src="icons/pulse.png" alt="">

          </div>

          <h2 id="totalReceita">R$ 0,00</h2>

        </div>

        <div class="product-card">

          <div class="product-card-top">

            <span>Pedidos</span>

            <img src="icons/folder.png" alt="">

          </div>

          <h2 id="totalPedidos">0</h2>

        </div>

        <div class="product-card">

          <div class="product-card-top">

            <span>Clientes Online</span>

            <img src="icons/users.png" alt="">

          </div>

          <h2 id="clientesOnline">0</h2>

        </div>

      </div>

      <!-- TABELA -->
      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>Comida</th>
              <th>Vendas</th>
              <th>Receita</th>
              <th>Status</th>

            </tr>

          </thead>

          <tbody id="graphTableBody">

          </tbody>

        </table>

      </div>

    </main>

    <!-- HELP -->
    <div class="floating-help">

      <img src="icons/question-mark.png" alt="">

    </div>

  </div>

  <script src="scripts/script_graph.js"></script>
  <script src="scripts/script_navigation.js"></script>

</body>

</html>
