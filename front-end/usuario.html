<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Perfil do Usuário</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="scripts/style_dashboard.css">

</head>

<body>

  <div class="wrapper">

    <aside class="sidebar">

      <div class="sidebar-mini">

        <div class="top-mini">

          <div class="logo">

            <img src="icons/windows-logo.png" alt="">

          </div>

          <div class="icon-group">

            <div class="icon" data-page="graph.html">

              <img src="icons/graph.png" alt="">

            </div>

            <div class="icon" data-page="lista.html">
              <img src="icons/dashboard-interface.png" alt="">
            </div>

          </div>

        </div>

        <div class="icon-group">

          <div class="icon" data-page="notifications.html">
            <img src="icons/bell.png" alt="">
          </div>

          <div class="icon" data-page="dashboard.html">

            <img src="icons/settings.png" alt="">

          </div>

          <div class="icon active">

            <img src="icons/user-circle.png" alt="">

          </div>

        </div>

      </div>

      <div class="sidebar-content">

        <div class="menu-btn">

          <img src="icons/button.png" alt="">

        </div>

        <div class="nav">

          <div class="nav-item active">

            <img src="icons/user.png" class="menu-icon" alt="">

            <span>Perfil do Usuário</span>

          </div>

        </div>

      </div>

    </aside>

    <main class="main">

      <div class="topbar">

        <h1 class="title">
          Informações do Usuário
        </h1>

      </div>

      <!-- CARD PERFIL -->

      <div class="table-container profile-container">

        <div class="profile-header">

          <div class="profile-left">

            <div class="profile-avatar">
              U
            </div>

            <div>

              <h2 class="profile-name">
                Usuário 1
              </h2>

              <p class="profile-email">
                usuario@gmail.com
              </p>

            </div>

          </div>

          <div class="profile-status">
            Ativo
          </div>

        </div>

        <!-- INFORMAÇÕES -->

        <div class="profile-grid">

          <div class="profile-card">

            <span class="profile-label">
              Nome Completo
            </span>

            <span class="profile-value">
              Usuário 1
            </span>

          </div>

          <div class="profile-card">

            <span class="profile-label">
              Email
            </span>

            <span class="profile-value">
              usuario@gmail.com
            </span>

          </div>

          <div class="profile-card">

            <span class="profile-label">
              Cargo
            </span>

            <span class="profile-value">
              Administrador
            </span>

          </div>

          <div class="profile-card">

            <span class="profile-label">
              Status
            </span>

            <span class="profile-value">
              Ativo
            </span>

          </div>

          <div class="profile-card">

            <span class="profile-label">
              Data da Criação
            </span>

            <span class="profile-value">
              Jan 10, 2022
            </span>

          </div>

          <div class="profile-card">

            <span class="profile-label">
              Último Login
            </span>

            <span class="profile-value">
              Hoje às 14:30
            </span>

          </div>

        </div>

        <!-- BOTÕES -->

        <div class="profile-actions">

          <button class="new-user">

            <img src="icons/edit.png" class="button-icon" alt="">

            Editar Usuário

          </button>

          <button class="delete-user-btn">

            <img src="icons/trash.png" class="button-icon" alt="">

            Deletar Usuário

          </button>

        </div>

      </div>

    </main>

  </div>

  <script src="scripts/script_products.js"></script>

</body>

</html>
